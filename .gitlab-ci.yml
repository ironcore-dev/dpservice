stages:
  - build

variables:
  GOPRIVATE: "gitlab.devops.telekom.de"
  GOPROXY: "https://proxy.golang.org"
  CODE_QUALITY_DISABLED: "true"

.defaults_template:
  image: ${MTR_GITLAB_HOST}/osc/gardener/osc-builder:v4.0.0
  tags:
    - docker
    - pes
    - osc
  before_script:
    - mkdir -p ${GOPATH}/src/${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git
    - rm -rf ${GOPATH}/src/${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git
    - mv $CI_PROJECT_DIR ${GOPATH}/src/${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git
    - mkdir -p $CI_PROJECT_DIR
    - cd ${GOPATH}/src/${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git

build-dev:
  extends: .defaults_template
  stage: build
  script:
    - chmod +x ./hack/build-all.sh ./hack/container-build.sh ./hack/cosign-main.sh
    - ./hack/build-all.sh dev
  only:
    - osc/main

build-branches:
  extends: .defaults_template
  stage: build
  script:
    - chmod +x ./hack/build-all.sh ./hack/container-build.sh ./hack/cosign-main.sh
    - ./hack/build-all.sh ${CI_COMMIT_REF_NAME}
  only:
    - /feature-.*$/
    - /bugfix-.*$/
    - /release-fix-.*$/
  except:
    - tags

build-tag:
  extends: .defaults_template
  stage: build
  script:
    - chmod +x ./hack/build-all.sh ./hack/container-build.sh ./hack/cosign-main.sh
    - ./hack/build-all.sh ${CI_COMMIT_TAG}
  only:
    # must match v0.0
    - /^v(\d+)\.(\d+).*$/
  except:
    - branches